on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      lambda-function-name:
        required: true
        type: string
        description: AWS Lambda function name to deploy to
      aws-region:
        required: false
        type: string
        default: us-east-1
        description: AWS region for deployment
      version-name:
        required: true
        type: string
        description: descriptive id of what's deployed (e.g. release name or pr number). doesn't have to be unique, the git hash is appended later
    secrets:
      AWS_ROLE_ARN:
        required: true
      SLACK_WEBHOOK:
        required: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.env }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.env }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache ASDF runtime
        uses: actions/cache@v4
        with:
          path: ~/.asdf
          key: asdf-${{ hashFiles('.tool-versions') }}

      - uses: asdf-vm/actions/install@v4

      - name: Setup ASDF environment
        uses: mbta/actions/reshim-asdf@v2

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build project
        run: corepack yarn build

      - name: Create deployment package
        id: package
        run: |
          BUILD_DIR=build
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          cp -r dist "$BUILD_DIR/dist"
          cp -r node_modules "$BUILD_DIR/node_modules"
          zip -r lambda_output.zip "$BUILD_DIR"
          echo "package-path=lambda_output.zip" >> $GITHUB_OUTPUT
          echo "package-size=$(du -h lambda_output.zip | cut -f1)" >> $GITHUB_OUTPUT

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --region ${{ inputs.aws-region }} \
            --function-name "${{ inputs.lambda-function-name }}" \
            --zip-file "fileb://${{ steps.package.outputs.package-path }}"

      - name: Get function info
        id: lambda-info
        run: |
          FUNCTION_INFO=$(aws lambda get-function \
            --region ${{ inputs.aws-region }} \
            --function-name "${{ inputs.lambda-function-name }}")
          VERSION=$(echo "$FUNCTION_INFO" | jq -r '.Configuration.Version')
          LAST_MODIFIED=$(echo "$FUNCTION_INFO" | jq -r '.Configuration.LastModified')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "last-modified=$LAST_MODIFIED" >> $GITHUB_OUTPUT

      - uses: mbta/actions/notify-slack-deploy@v2
        if: ${{ !cancelled() }}
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          job-status: ${{ job.status }}
          custom-message: |
            Deployed MoveSafe Backend to Lambda (${{ inputs.env }})
            📦 Package: ${{ steps.package.outputs.package-size }}
            🔖 Version: ${{ steps.lambda-info.outputs.version }}
            ⏰ Deployed: ${{ steps.lambda-info.outputs.last-modified }}
